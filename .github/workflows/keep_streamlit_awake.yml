name: Keep Streamlit Awake

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ping Streamlit app
        run: |
          python3 scripts/keep_streamlit_awake.py \
            --url "https://forge-team.streamlit.app/" \
            --once \
            --timeout-seconds 25
